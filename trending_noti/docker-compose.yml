services:
    rsshub:
        # two ways to enable puppeteer:
        # * comment out marked lines, then use this image instead: diygod/rsshub:chromium-bundled
        # * (consumes more disk space and memory) leave everything unchanged
        image: diygod/rsshub # or ghcr.io/diygod/rsshub
        # platform: linux/amd64 
        restart: always
        ports:
            - '1200:1200'
        # 新增
        env_file: 
            - .env
        environment:
            NODE_ENV: production
            CACHE_TYPE: redis
            REDIS_URL: 'redis://redis:6379/'
            PUPPETEER_WS_ENDPOINT: 'ws://browserless:3000' # marked
            PUPPETEER_REAL_BROWSER_SERVICE: 'http://real-browser:3000' # marked
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:1200/healthz']
            interval: 30s
            timeout: 10s
            retries: 3
        depends_on:
            - redis
            - browserless # marked
#报错：failed to decode referrers index: invalid character '<' looking for beginning of value，不纠结了，直接注释掉了，反正也不影响使用
    # real-browser:
    #     image: ghcr.io/hyoban/puppeteer-real-browser-hono
    #     platform: linux/amd64 
    #     restart: always
    #     ports:
    #         - '3001:3000'
    #     healthcheck:
    #         test: ['CMD', 'curl', '-f', 'http://localhost:3000']
    #         interval: 30s
    #         timeout: 10s
    #         retries: 3

    browserless: # marked
        image: browserless/chrome # marked
        # platform: linux/amd64 
        restart: always # marked
        ulimits: # marked
            core: # marked
                hard: 0 # marked
                soft: 0 # marked
        healthcheck: # marked
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/pressure'] # marked
            interval: 30s # marked
            timeout: 10s # marked
            retries: 3 # marked

    redis:
        image: redis:alpine
        # platform: linux/amd64 
        restart: always
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 5s

volumes:
    redis-data:
